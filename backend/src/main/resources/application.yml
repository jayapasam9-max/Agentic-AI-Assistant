spring:
  application:
    name: code-review-agent
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/codereview}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.lob.non_contextual_creation: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: code-review-agent
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.codereview.agent.kafka.event"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: claude-opus-4-7
  max-tokens: 8192

github:
  app-id: ${GITHUB_APP_ID:}
  private-key: ${GITHUB_PRIVATE_KEY:}
  webhook-secret: ${GITHUB_WEBHOOK_SECRET:}

agent:
  max-iterations: 15
  tools:
    semgrep-path: ${SEMGREP_PATH:semgrep}
    trivy-path: ${TRIVY_PATH:trivy}

kafka-topics:
  review-jobs: review-jobs
  review-events: review-events

logging:
  level:
    com.codereview.agent: DEBUG
    dev.langchain4j: INFO
